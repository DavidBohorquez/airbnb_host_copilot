# Completed in M12 (docs/13_eval_monitoring.md). Runs lint + tests on push/PR.
name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        run: uv python install 3.13

      - name: Install deps
        run: uv sync --all-groups

      - name: Lint
        run: uv run ruff check src tests

      - name: Test
        run: uv run pytest -q